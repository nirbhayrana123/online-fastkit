<!DOCTYPE html>
<html>
 
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>FreshDrop</title>


	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link
		href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
		rel="stylesheet">
	<!-- <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"  > -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

	<link rel="stylesheet" href="css/style.css" rel="stylesheet" type="text/css">
</head>

<body>



<div class="header"> 
  <div class="logo">Fastkit</div>
<div class="delivery">
  <strong>Delivery in 8 minutes</strong><br>

  <div class="location-box" onclick="toggleDropdown()">
    <span id="selectedLocation">Select Location 📍</span>
  </div>

  <div class="dropdown" id="dropdown">
    <div onclick="selectLocation('Delhi')">Delhi</div>
    <div onclick="selectLocation('Mumbai')">Mumbai</div>
    <div onclick="selectLocation('Dehradun')">Dehradun</div>
    <div onclick="selectLocation('My Village')">My Village</div>
  </div>
</div>

  <!-- Search -->
  <div class="search">
    <input type="text" placeholder='Search "milk"'>
  </div>

  <!-- Right -->
  <div class="right">
    <div class="login">Login</div> 
    <div class="cart-btn" onclick="toggleCart()">Cart 🛒</div>
  </div>

</div>

<div class="hero">
  <h1>Fresh Grocery in 15 Minutes 🚚</h1>
  <p>Fast • Fresh • Reliable</p>
</div>

<div class="container">
  <h2>Popular Items</h2>
  <div class="products" id="products"></div>
</div>

<div class="cart" id="cartBox" style="display:none;">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <div class="total" id="total"></div>
  <button class="order-btn" onclick="placeOrder()">Place Order</button>
</div>

<script>
let cart = [];

const products = [
  {name:"Tomato", price:20, img:"https://images.unsplash.com/photo-1582284540020-8acbe03f4924"},
  {name:"Potato", price:15, img:"https://images.unsplash.com/photo-1590165482129-1b8b27698780"},
  {name:"Milk", price:50, img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"},
  {name:"Apple", price:100, img:"https://images.unsplash.com/photo-1567306226416-28f0efdc88ce"},
  {name:"Banana", price:40, img:"https://images.unsplash.com/photo-1574226516831-e1dff420e12d"},
  {name:"Bread", price:30, img:"https://images.unsplash.com/photo-1608198093002-ad4e005484ec"}
];

const productDiv = document.getElementById("products");

products.forEach((p, i) => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${p.img}">
    <h3>${p.name}</h3>
    <p class="price">₹${p.price}</p>
    <button onclick="addToCart(${i})">Add to Cart</button>
  `;
  productDiv.appendChild(div);
});

function addToCart(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  const cartItems = document.getElementById("cartItems");
  const totalEl = document.getElementById("total");

  cartItems.innerHTML = "";
  let total = 0;

  cart.forEach(item=>{
    const div = document.createElement("div");
    div.className = "cart-item";
    div.innerText = item.name + " - ₹" + item.price;
    cartItems.appendChild(div);
    total += item.price;
  });

  totalEl.innerText = "Total: ₹" + total;
}

function toggleCart(){
  const cartBox = document.getElementById("cartBox");
  cartBox.style.display = cartBox.style.display === "none" ? "block" : "none";
}

function placeOrder(){
  if(cart.length === 0){
    alert("Cart empty!");
    return;
  }

  let msg = "Order:\n";
  cart.forEach(i=>{
    msg += i.name + " - ₹" + i.price + "\n";
  });

  msg += "\nTotal: ₹" + cart.reduce((a,b)=>a+b.price,0);

  window.open(`https://wa.me/8865951922?text=${encodeURIComponent(msg)}`);
}
</script>


<script>
function toggleDropdown() {
  const d = document.getElementById("dropdown");
  d.style.display = d.style.display === "block" ? "none" : "block";
}

function selectLocation(loc) {
  document.getElementById("selectedLocation").innerText = loc + " 📍";
  document.getElementById("dropdown").style.display = "none";
}

// Close dropdown when clicking outside
window.onclick = function(e) {
  if (!e.target.closest(".delivery")) {
    document.getElementById("dropdown").style.display = "none";
  }
}
</script>

 

</body>
</html>
